name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

env:
  CONAN_HOME: "${{ github.workspace }}/release/"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          ninja: true
          conan: true
          ccache: true
          clang-tidy: true
          cppcheck: true
 
      - name: check conan cache
        uses: actions/cache@v5
        id: check_cache
        with:
            path: ${{ env.CONAN_HOME }}
            key: deps-${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}

      - name: Build cache
        uses: actions/cache@v5
        with:
          path: |
            ./build/
            ~/vcpkg
            ~/.cache/vcpkg/archives
            ${{ env.LOCALAPPDATA }}/vcpkg/archives
            ${{ env.APPDATA }}/vcpkg/archives
            ${{ env.XDG_CACHE_HOME }}/vcpkg/archives
            ~/.cache/ccache
            ~/.ccache
            ~/.config/ccache
            ~/Library/Caches/ccache
            ${{ env.LOCALAPPDATA }}/ccache
            ${{ env.XDG_CACHE_HOME }}/ccache
          key: ${{ runner.os }}-deps-lint-${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-lint-

      - name: conan detect profile
        run: |
          conan profile detect --force
 
      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: lint
          buildPreset: lint
          testPreset: lint

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          ninja: true
          conan: true
          ccache: true
 
      - name: check conan cache
        uses: actions/cache@v5
        id: check_cache
        with:
            path: ${{ env.CONAN_HOME }}
            key: deps-${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}

      - name: Build cache
        uses: actions/cache@v5
        with:
          path: |
            ./build/
            ~/vcpkg
            ~/.cache/vcpkg/archives
            ${{ env.LOCALAPPDATA }}/vcpkg/archives
            ${{ env.APPDATA }}/vcpkg/archives
            ${{ env.XDG_CACHE_HOME }}/vcpkg/archives
            ~/.cache/ccache
            ~/.ccache
            ~/.config/ccache
            ~/Library/Caches/ccache
            ${{ env.LOCALAPPDATA }}/ccache
            ${{ env.XDG_CACHE_HOME }}/ccache
          key: ${{ runner.os }}-deps-coverage-${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-coverage-

      - name: conan detect profile
        run: |
          conan profile detect --force
 
      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: coverage
          buildPreset: coverage
          testPreset: coverage

      - name: Process coverage info
        run: cmake --build build -t coverage
 
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: > 
            --define sonar.cfamily.compile-commands=build/compile_commands.json
