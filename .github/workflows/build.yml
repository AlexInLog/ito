name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read   # safe default for tests/coverage jobs and PR runs

env:
  CONAN_HOME: "${{ github.workspace }}/release/"

jobs: 
  tests:
    strategy:
      matrix:
        config:
        - { name: lint-ubuntu-gcc,   os: ubuntu-latest,  compiler: gcc,          lint: true,  configurePreset: lint,            testPreset: tests }
        - { name: lint-ubuntu-clang, os: ubuntu-latest,  compiler: llvm,         lint: true,  configurePreset: lint,            testPreset: tests  }
        - { name: lint-windows,      os: windows-latest, compiler: msvc,         lint: false, configurePreset: debug,           testPreset: tests   }
        - { name: lint-macos,        os: macos-latest,   compiler: apple-clang,  lint: true,  configurePreset: lint,            testPreset: tests   }
        - { name: sanitize-tsan,     os: ubuntu-latest,  compiler: llvm,         lint: false, configurePreset: sanitize-tsan,   testPreset: sanitize   }
        - { name: sanitize-asan,     os: ubuntu-latest,  compiler: llvm,         lint: false, configurePreset: sanitize-asan,   testPreset: sanitize   }
        - { name: sanitize-lsan,     os: ubuntu-latest,  compiler: llvm,         lint: false, configurePreset: sanitize-lsan,   testPreset: sanitize   }
        - { name: sanitize-ubsan,    os: ubuntu-latest,  compiler: llvm,         lint: false, configurePreset: sanitize-ubsan,  testPreset: sanitize   }

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Build cache
        uses: actions/cache@v5
        with:
          path: |
            ./build/
            ~/vcpkg
            ~/.cache/vcpkg/archives
            ${{ env.LOCALAPPDATA }}/vcpkg/archives
            ${{ env.APPDATA }}/vcpkg/archives
            ${{ env.XDG_CACHE_HOME }}/vcpkg/archives
            ~/.cache/ccache
            ~/.ccache
            ~/.config/ccache
            ~/Library/Caches/ccache
            ${{ env.LOCALAPPDATA }}/ccache
            ${{ env.XDG_CACHE_HOME }}/ccache
          key: ${{ runner.os }}-deps-tests--${{ matrix.config.name }}-${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-tests--${{ matrix.config.name }}-

      - name: Setup Cpp
        if: ${{ matrix.config.os != 'windows-latest' }}
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.config.compiler }}
          cmake: true
          ninja: true
          ccache: true
          clang-tidy: ${{ matrix.config.lint }}
          cppcheck: ${{ matrix.config.lint }}

      - uses: actions/setup-python@v6
        with: { python-version: "3.8" }

      - name: get conan
        uses: turtlebrowser/get-conan@main
 
      - name: check conan cache
        uses: actions/cache@v5
        id: check_cache
        with:
            path: ${{ env.CONAN_HOME }}
            key: deps-tests-${{ matrix.config.name }}-${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}

      - name: conan detect profile
        run: |
          conan profile detect --force
 
      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: ${{ matrix.config.configurePreset }}
          buildPreset: build
          testPreset: ${{ matrix.config.testPreset }}
        env:
          VCPKG_ROOT: ''

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      BUILD_WRAPPER_OUT_DIR: build_wrapper_output_directory # Directory where build-wrapper output will be placed
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Build cache
        uses: actions/cache@v5
        with:
          path: |
            ./build/
            ~/vcpkg
            ~/.cache/vcpkg/archives
            ${{ env.LOCALAPPDATA }}/vcpkg/archives
            ${{ env.APPDATA }}/vcpkg/archives
            ${{ env.XDG_CACHE_HOME }}/vcpkg/archives
            ~/.cache/ccache
            ~/.ccache
            ~/.config/ccache
            ~/Library/Caches/ccache
            ${{ env.LOCALAPPDATA }}/ccache
            ${{ env.XDG_CACHE_HOME }}/ccache
          key: ${{ runner.os }}-deps-coverage--${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-coverage--
            
      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          ninja: true
          conan: true
          ccache: true
 
      - name: check conan cache
        uses: actions/cache@v5
        id: check_cache
        with:
            path: ${{ env.CONAN_HOME }}
            key: deps-coverage--${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}

      - name: conan detect profile
        run: |
          conan profile detect --force
 
      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: coverage
          buildPreset: build
          testPreset: tests

      - name: Process coverage info
        run: cmake --build build -t coverage
 
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: > 
            --define sonar.cfamily.compile-commands=build/compile_commands.json

  benchmark-run:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    # no permissions override needed -> inherits contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Build cache
        uses: actions/cache@v5
        with:
          path: |
            ./build/
            ~/vcpkg
            ~/.cache/vcpkg/archives
            ${{ env.LOCALAPPDATA }}/vcpkg/archives
            ${{ env.APPDATA }}/vcpkg/archives
            ${{ env.XDG_CACHE_HOME }}/vcpkg/archives
            ~/.cache/ccache
            ~/.ccache
            ~/.config/ccache
            ~/Library/Caches/ccache
            ${{ env.LOCALAPPDATA }}/ccache
            ${{ env.XDG_CACHE_HOME }}/ccache
          key: ${{ runner.os }}-deps-benchmark--${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-deps-benchmark--

      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          compiler: llvm
          cmake: true
          ninja: true
          conan: true
          ccache: true

      - name: check conan cache
        uses: actions/cache@v5
        id: check_cache
        with:
          path: ${{ env.CONAN_HOME }}
          key: deps-benchmark--${{ hashFiles('**/conanfile.py') }}-${{ hashFiles('**/CMakePresets.json') }}

      - name: conan detect profile
        run: |
          conan profile detect --force

      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: release
          buildPreset: build

      - name: Run Benchmarks
        run: |
          ./build/bin/ito_benchmarks | tee benchmark_results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark_results.txt

  benchmark-report:
    name: Benchmark Report (PR)
    needs: benchmark-run
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write   # only what's needed to post a PR comment
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: benchmark-results

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Ito benchmarks - Ubuntu - clang
          tool: 'catch2'
          output-file-path: ./benchmark_results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '200%'
          comment-on-alert: true
          summary-always: true
          comment-always: true
          fail-on-alert: true

  benchmark-publish:
    name: Publish Benchmarks (main)
    needs: benchmark-run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      # deployments permission to deploy GitHub pages website
      deployments: write
      # contents permission to update benchmark contents in gh-pages branch
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: benchmark-results

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Ito benchmarks - Ubuntu - clang
          tool: 'catch2'
          output-file-path: ./benchmark_results.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '200%'
          comment-on-alert: true
          summary-always: true
          comment-always: true   
          fail-on-alert: true
